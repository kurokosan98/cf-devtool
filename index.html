<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTools - 开发者工具箱</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="sidebar-backdrop"></div>
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo-icon">&#x1F6E0;</span> DevTools</h1>
      <button id="sidebar-toggle" class="icon-btn" title="切换侧栏">&#x2630;</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索工具..." autocomplete="off">
    </div>
    <nav id="tool-nav"></nav>
    <div class="sidebar-footer">
      <span class="tool-count" id="tool-count"></span>
      <a href="#" id="add-tool-link" class="add-tool-link" title="如何添加工具？">+ 扩展</a>
    </div>
  </aside>
  <button id="mobile-menu-btn" class="mobile-menu-btn" title="打开菜单">&#x2630;</button>
  <main id="main-content">
    <div id="tool-container">
      <div id="welcome-screen">
        <div class="welcome-icon">&#x1F6E0;</div>
        <h2>开发者工具箱</h2>
        <p>从左侧选择一个工具开始使用</p>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script type="module" src="js/registry.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
